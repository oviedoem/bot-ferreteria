name: Convertir CSV a JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV desde OneDrive
        run: |
          # Usar URL de embed convertida a download
          # Share URL: https://1drv.ms/x/c/0997a298f38f1554/IQDTKITBKIuTU7N61LmciS_tAbyxt2Zby_apU49-e_J6qjA?e=he8jxe
          EMBED_URL="https://onedrive.live.com/embed?resid=C18428D38B284F54B37AD4B99C892FED%21115&authkey=%21AJ6qjA"
          DOWNLOAD_URL=$(echo "$EMBED_URL" | sed 's/embed/download/')
          echo "Intentando descargar desde: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o PRODUCTOS.csv 2>&1 || echo "Error en descarga"
          ls -la PRODUCTOS.csv
          head -5 PRODUCTOS.csv

      - name: Instalar dependencias
        run: pip install pandas

      - name: Ejecutar conversion
        run: python convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar output
        run: |
          echo "Tamaño del JSON generado:"
          wc -c productos.json
          head -30 productos.json

      - name: Commit cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add productos.json
          if git diff --staged --quiet; then
            echo "No hay cambios"
          else
            git commit -m "Actualizar catalogo de productos desde CSV" || echo "No hay cambios"
            git push "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          fi
