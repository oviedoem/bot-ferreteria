name: Actualizar catalogo de productos
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas requests

      - name: Descargar CSV desde OneDrive
        run: python descargar_csv.py

      - name: Verificar descarga
        run: |
          echo "Tamanio del CSV descargado:"
          wc -c PRODUCTOS.csv
          if [ ! -s PRODUCTOS.csv ]; then
            echo "ERROR: Archivo vacio o no descargado"
            exit 1
          fi
          echo "--- Primeras lineas ---"
          head -5 PRODUCTOS.csv

      - name: Convertir CSV a JSON
        run: python convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar salida JSON
        run: |
          echo "Tamanio del JSON generado:"
          wc -c productos.json
          echo "--- Contenido inicial ---"
          head -30 productos.json

      - name: Commit cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PRODUCTOS.csv productos.json
          git diff-index --quiet HEAD || git commit -m "Actualizar catalogo de productos" -a
          git push
