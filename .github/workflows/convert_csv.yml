name: Convertir CSV a JSON
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV desde OneDrive
        run: |
          DOWNLOAD_URL="https://onedrive.live.com/download?resid=C18428D38B284F54B37AD4B99C892FED%21115&authkey=%21AJ6qjA&cid=c18428d38b284f54"
          echo "Descargando desde: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o PRODUCTOS.csv 2>&1
          echo "---"
          ls -la PRODUCTOS.csv
          echo "---"
          if [ -f PRODUCTOS.csv ]; then
            echo "Archivo descargado exitosamente"
            head -3 PRODUCTOS.csv
          else
            echo "ERROR: No se pudo descargar el archivo"
            exit 1
          fi

      - name: Instalar dependencias
        run: pip install pandas

      - name: Ejecutar conversion
        run: python convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar output
        run: |
          echo "Tamanho del JSON generado:"
          wc -c productos.json
          head -30 productos.json

      - name: Commit cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add productos.json
          if git diff --staged --quiet; then
            echo "No hay cambios"
          else
            git commit -m "Actualizar catalogo de productos desde CSV" || echo "No hay cambios"
            git push "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          fi
