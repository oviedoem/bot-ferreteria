name: Actualizar catalogo de productos
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV desde OneDrive
        run: python3 download_csv.py

      - name: Verificar descarga
        run: |
          wc -c PRODUCTOS.csv
          if [ ! -s PRODUCTOS.csv ]; then exit 1; fi

      - name: Instalar dependencias
        run: pip install requests

      - name: Convertir CSV a JSON
        run: python3 convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar salida JSON
        run: python3 -c "import json; data=json.load(open('productos.json')); print(f'{len(data.get(\"productos\", []))} productos cargados')"

      - name: Commit cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PRODUCTOS.csv productos.json
          git diff-index --quiet HEAD || git commit -m "Actualizar catalogo de productos" -a
          git push
