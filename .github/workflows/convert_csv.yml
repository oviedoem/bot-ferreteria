name: Actualizar catalogo de productos
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV desde OneDrive
        run: |
          DOWNLOAD_URL="https://onedrive.live.com/download?resid=C18428D38B284F54B37AD4B99C892FED"
          echo "Descargando desde: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o PRODUCTOS.csv
          echo "---"
          ls -la PRODUCTOS.csv
          echo "---"
          if [ -f PRODUCTOS.csv ]; then
            echo "Archivo descargado exitosamente"
            head -3 PRODUCTOS.csv
          else
            echo "ERROR: No se pudo descargar el archivo"
            exit 1
          fi

      - name: Verificar descarga
        run: |
          wc -c PRODUCTOS.csv
          if [ ! -s PRODUCTOS.csv ]; then exit 1; fi

      - name: Instalar dependencias
        run: pip install pandas

      - name: Convertir CSV a JSON
        run: python convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar salida JSON
        run: |
          echo "Tamaño del JSON generado:"
          wc -c productos.json
          head -30 productos.json

      - name: Commit cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PRODUCTOS.csv productos.json
          git diff-index --quiet HEAD || git commit -m "Actualizar catalogo de productos" -a
          git push
