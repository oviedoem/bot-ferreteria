name: Convertir CSV a JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV desde OneDrive
        run: |
          python3 << 'PYEOF'
import base64
import urllib.request

share_url = "https://1drv.ms/x/c/0997a298f38f1554/IQDTKITBKItUT7N61LmciS_tAbyxt2Zby_apU49-e_J6qjA?e=he8jxe"
encoded = base64.urlsafe_b64encode(share_url.encode()).rstrip(b'=').decode()
api_url = f"https://api.onedrive.com/v1.0/shares/u!{encoded}/root/content"
print(f"Descargando desde: {api_url}")
headers = {"Accept": "*/*"}
req = urllib.request.Request(api_url, headers=headers)
with urllib.request.urlopen(req, timeout=30) as r:
    data = r.read()
with open("PRODUCTOS.csv", "wb") as f:
    f.write(data)
print(f"Descargado: {len(data)} bytes")
PYEOF
          wc -c PRODUCTOS.csv
          if [ ! -s PRODUCTOS.csv ]; then exit 1; fi

      - name: Instalar dependencias
        run: pip install requests

      - name: conversion ejecutable
        run: python convertir_csv.py PRODUCTOS.csv productos.json

      - name: Verificar salida
        run: |
          python3 -c "import json; data=json.load(open('productos.json')); print(len(data))"

      - name: Comprometer cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PRODUCTOS.csv productos.json
          git diff-index --quiet HEAD || git commit -m "Actualizar CSV y productos.json" -a
          git push
